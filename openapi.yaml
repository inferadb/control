                    type: string
                  default: []
      responses:
        "201":
          description: Token pair.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenPair"
        "401":
          $ref: "#/components/responses/AuthenticationError"
    delete:
      tags: [Tokens]
      summary: Revoke vault tokens
      description: Revokes all tokens for a specific application in this vault.
      operationId: revokeVaultTokens
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OrgSlug"
        - $ref: "#/components/parameters/VaultSlug"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [app]
              properties:
                app:
                  type: integer
                  format: uint64
      responses:
        "200":
          description: Tokens revoked.
          content:
            application/json:
              schema:
                type: object
                properties:
                  revoked_count:
                    type: integer
                    format: uint64
        "401":
          $ref: "#/components/responses/AuthenticationError"

  /control/v1/tokens/refresh:
    post:
      tags: [Tokens]
      summary: Refresh a vault token
      operationId: refreshVaultToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token:
                  type: string
      responses:
        "200":
          description: New token pair.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenPair"
        "401":
          $ref: "#/components/responses/AuthenticationError"

  /control/v1/token:
    post:
      tags: [Tokens]
      summary: Client assertion authentication
      description: |
        Machine-to-machine authentication using RFC 7523 JWT Bearer grant.
        The client signs a JWT assertion with its Ed25519 private key.
      operationId: clientAssertionAuth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [grant_type, client_assertion_type, client_assertion, organization, vault]
              properties:
                grant_type:
                  type: string
                  enum: ["urn:ietf:params:oauth:grant-type:jwt-bearer"]
                client_assertion_type:
                  type: string
                  enum: ["urn:ietf:params:oauth:client-assertion-type:jwt-bearer"]
                client_assertion:
                  type: string
                  description: Signed JWT assertion.
                organization:
                  type: integer
                  format: uint64
                vault:
                  type: string
                scopes:
                  type: array
                  items:
                    type: string
                  default: []
                requested_role:
                  type: string
      responses:
        "201":
          description: Token pair.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenPair"
        "401":
          $ref: "#/components/responses/AuthenticationError"
        "429":
          $ref: "#/components/responses/RateLimited"

  # ── Audit Logs ───────────────────────────────────────────────────────

  /control/v1/organizations/{org}/audit-logs:
    get:
      tags: [Audit logs]
      summary: Query audit logs
      operationId: listAuditLogs
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OrgSlug"
        - $ref: "#/components/parameters/PageSize"
        - $ref: "#/components/parameters/PageToken"
        - name: event_type
          in: query
          schema:
            type: string
          description: Filter by event type prefix (e.g., `ledger.vault`).
        - name: principal
          in: query
          schema:
            type: string
          description: Filter by principal identifier.
        - name: outcome
          in: query
          schema:
            type: string
          description: Filter by outcome (e.g., `success`, `failure`).
      responses:
        "200":
          description: Audit log entries.
          content:
            application/json:
              schema:
                type: object
                properties:
                  entries:
                    type: array
                    items:
                      $ref: "#/components/schemas/AuditLogEntry"
                  next_page_token:
                    type: string
                  total_estimate:
                    type: integer
                    format: uint64
        "401":
          $ref: "#/components/responses/AuthenticationError"

  # ── Health ───────────────────────────────────────────────────────────

  /healthz:
    get:
      tags: [Health]
      summary: Health check
      operationId: healthz
      responses:
        "200":
          description: Service health.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /livez:
    get:
      tags: [Health]
      summary: Liveness probe
      operationId: livez
      responses:
        "200":
          description: Service is alive.

  /readyz:
    get:
      tags: [Health]
      summary: Readiness probe
      operationId: readyz
      responses:
        "200":
          description: Service is ready.
        "503":
          description: Service is not ready.

  /startupz:
    get:
      tags: [Health]
      summary: Startup probe
      operationId: startupz
      responses:
        "200":
          description: Service has started.
        "503":
          description: Service is still starting.

  /metrics:
    get:
      tags: [Health]
      summary: Prometheus metrics
      operationId: metrics
      responses:
        "200":
          description: Prometheus text exposition format.
          content:
            text/plain:
              schema:
                type: string

# ── Components ───────────────────────────────────────────────────────

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Ed25519-signed JWT access token.

  parameters:
    OrgSlug:
      name: org
      in: path
      required: true
      schema:
        type: integer
        format: uint64
      description: Organization slug.

    VaultSlug:
      name: vault
      in: path
      required: true
      schema:
        type: integer
        format: uint64
      description: Vault slug.

    TeamSlug:
      name: team
      in: path
      required: true
      schema:
        type: integer
        format: uint64
      description: Team slug.

    ClientSlug:
      name: client
      in: path
      required: true
      schema:
        type: integer
        format: uint64
      description: Client (application) slug.

    CertSlug:
      name: cert
      in: path
      required: true
      schema:
        type: integer
        format: uint64
      description: Certificate slug.

    MemberSlug:
      name: member
      in: path
      required: true
      schema:
        type: integer
        format: uint64
      description: Member (user) slug.

    InvitationSlug:
      name: invitation
      in: path
      required: true
      schema:
        type: integer
        format: uint64
      description: Invitation slug.

    EmailId:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: uint64
      description: Email address slug.

    PageSize:
      name: page_size
      in: query
      schema:
        type: integer
        format: uint32
        default: 50
        minimum: 1
        maximum: 100
      description: Number of results per page.

    PageToken:
      name: page_token
      in: query
      schema:
        type: string
      description: Opaque cursor from a previous response's `next_page_token`.

  schemas:
    SessionTokenResponse:
      type: object
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        token_type:
          type: string
          example: Bearer

    TokenPair:
      type: object
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        token_type:
          type: string
          example: Bearer
        expires_in:
          type: integer
          format: uint64
          description: Token lifetime in seconds.

    MessageResponse:
      type: object
      properties:
        message:
          type: string

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        code:
          type: string
          description: |
            Machine-readable error code. Values: `AUTHENTICATION_ERROR`,
            `AUTHORIZATION_ERROR`, `VALIDATION_ERROR`, `NOT_FOUND`,
            `ALREADY_EXISTS`, `RATE_LIMIT_EXCEEDED`, `TIER_LIMIT_EXCEEDED`,
            `TOO_MANY_PASSKEYS`, `SERVICE_UNAVAILABLE`, `EXTERNAL_SERVICE_ERROR`,
            `INTERNAL_ERROR`, `CONFIGURATION_ERROR`, `STORAGE_ERROR`.

    VerifyAuthenticated:
      type: object
      properties:
        status:
          type: string
          enum: [authenticated]
        access_token:
          type: string
        refresh_token:
          type: string
        token_type:
          type: string

    VerifyTotpRequired:
      type: object
      properties:
        status:
          type: string
          enum: [totp_required]
        challenge_nonce:
          type: string

    VerifyRegistrationRequired:
      type: object
      properties:
        status:
          type: string
          enum: [registration_required]
        onboarding_token:
          type: string

    UserProfile:
      type: object
      properties:
        slug:
          type: integer
          format: uint64
        name:
          type: string
        status:
          type: string
        role:
          type: string
        created_at:
          type: string
          format: date-time

    EmailInfo:
      type: object
      properties:
        slug:
          type: integer
          format: uint64
        email:
          type: string
          format: email
        verified:
          type: boolean
        created_at:
          type: string
          format: date-time
        verified_at:
          type: string
          format: date-time

    Organization:
      type: object
      properties:
        slug:
          type: integer
          format: uint64
        name:
          type: string
        region:
          type: string
        status:
          type: string
        tier:
          type: string

    Member:
      type: object
      properties:
        user:
          type: integer
          format: uint64
        role:
          type: string
        joined_at:
          type: string
          format: date-time

    Invitation:
      type: object
      properties:
        slug:
          type: integer
          format: uint64
        organization:
          type: integer
          format: uint64
        inviter:
          type: integer
          format: uint64
        invitee_email:
          type: string
          format: email
        role:
          type: string
        status:
          type: string
        created_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time

    ReceivedInvitation:
      type: object
      properties:
        slug:
          type: integer
          format: uint64
        organization:
          type: integer
          format: uint64
        organization_name:
          type: string
        role:
          type: string
        status:
          type: string
        created_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time

    Team:
      type: object
      properties:
        slug:
          type: integer
          format: uint64
        organization:
          type: integer
          format: uint64
        name:
          type: string
        members:
          type: array
          items:
            $ref: "#/components/schemas/TeamMember"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    TeamMember:
      type: object
      properties:
        user:
          type: integer
          format: uint64
        role:
          type: string
          enum: [manager, member]
        joined_at:
          type: string
          format: date-time

    Client:
      type: object
      properties:
        slug:
          type: integer
          format: uint64
        name:
          type: string
        description:
          type: string
        enabled:
          type: boolean
        credentials:
          type: object
          properties:
            client_secret_enabled:
              type: boolean
            mtls_ca_enabled:
              type: boolean
            mtls_self_signed_enabled:
              type: boolean
            client_assertion_enabled:
              type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Certificate:
      type: object
      properties:
        slug:
          type: integer
          format: uint64
        name:
          type: string
        enabled:
          type: boolean
        expires_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time

    Vault:
      type: object
      properties:
        organization:
          type: integer
          format: uint64
        slug:
          type: integer
          format: uint64
        height:
          type: integer
          format: uint64
        status:
          type: string
        nodes:
          type: array
          items:
            type: string
        leader:
          type: string

    SchemaStatus:
      type: object
      properties:
        version:
          type: integer
          format: uint32
        status:
          type: string

    SchemaDefinition:
      type: object
      properties:
        version:
          type: integer
          format: uint32
        definition:
          type: object
        description:
          type: string

    AuditLogEntry:
      type: object
      properties:
        event_id:
          type: string
        event_type:
          type: string
        principal:
          type: string
        outcome:
          type: string
        timestamp:
          type: string
          format: date-time
        source:
          type: string
        action:
          type: string
        details:
          type: object
          additionalProperties:
            type: string

    HealthResponse:
      type: object
      properties:
        status:
          type: string
          enum: [healthy, degraded, unhealthy]
        service:
          type: string
          example: inferadb-control
        version:
          type: string
        instance_id:
          type: integer
          format: uint16
        uptime_seconds:
          type: integer
          format: uint64
        ledger_healthy:
          type: boolean
        details:
          type: string

  responses:
    ValidationError:
      description: Validation error.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: invalid email address
            code: VALIDATION_ERROR

    AuthenticationError:
      description: Authentication required or token invalid.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: authentication required
            code: AUTHENTICATION_ERROR

    AuthorizationError:
      description: Insufficient permissions.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: insufficient permissions
            code: AUTHORIZATION_ERROR

    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: not found
            code: NOT_FOUND

    RateLimited:
      description: Rate limit exceeded.
      headers:
        Retry-After:
          schema:
            type: integer
          description: Seconds until the rate limit resets.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: rate limit exceeded
            code: RATE_LIMIT_EXCEEDED
