# yaml-language-server: $schema=https://spec.openapis.org/oas/3.1/schema/2022-10-07
openapi: 3.1.0
info:
  title: InferaDB Control
  description: |
    Multi-tenant administration API for InferaDB. Manages organizations, users,
    vaults, clients, schemas, and token issuance.

    ## Authentication

    Control uses JWT Bearer tokens for API authentication. Obtain tokens via:

    - **Email code flow**: Passwordless authentication (initiate → verify → complete)
    - **Passkey (WebAuthn)**: FIDO2 authentication with hardware keys
    - **Client assertion**: RFC 7523 JWT Bearer grant for machine-to-machine auth

    Include the token in the `Authorization` header: `Authorization: Bearer <token>`.

    Read endpoints use locally-validated JWTs (Ed25519). Write endpoints validate
    tokens against the Ledger backend.

    ## Rate limiting

    - Login endpoints: 100 requests/hour per IP
    - Registration: 5 requests/day per IP

    Rate-limited responses return `429 Too Many Requests` with a `Retry-After` header.

    ## Pagination

    List endpoints use cursor-based pagination with `page_size` (default 50, max 100)
    and `page_token` query parameters. Responses include `next_page_token` when more
    results are available.

    ## Errors

    All error responses use the format: `{"error": "message", "code": "ERROR_CODE"}`.
  version: 0.1.0
  contact:
    name: InferaDB
    url: https://inferadb.com
    email: open@inferadb.com
  license:
    name: MIT OR Apache-2.0
    url: https://github.com/inferadb/control/blob/main/LICENSE-MIT

servers:
  - url: http://localhost:9090
    description: Local development

tags:
  - name: Email auth
    description: Passwordless email code authentication
  - name: Session
    description: Token refresh, logout, and session revocation
  - name: MFA
    description: TOTP, recovery codes, and passkey authentication
  - name: Passkey registration
    description: Register passkey credentials for the authenticated user
  - name: Users
    description: User profile management
  - name: Emails
    description: User email address management
  - name: Organizations
    description: Multi-tenant organization management
  - name: Members
    description: Organization membership management
  - name: Invitations
    description: Organization invitations
  - name: Teams
    description: Team management within organizations
  - name: Team members
    description: Team membership management
  - name: Clients
    description: API client (application) management
  - name: Certificates
    description: Client certificate lifecycle
  - name: Vaults
    description: Vault management within organizations
  - name: Schemas
    description: Vault schema versioning and deployment
  - name: Tokens
    description: Vault-scoped JWT generation and refresh
  - name: Audit logs
    description: Organization audit log querying
  - name: Health
    description: Health check and monitoring endpoints

paths:
  # ── Email Auth ───────────────────────────────────────────────────────

  /control/v1/auth/email/initiate:
    post:
      tags: [Email auth]
      summary: Send a verification code
      description: Sends a one-time verification code to the provided email address.
      operationId: emailInitiate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
                  example: alice@northwind.com
                region:
                  type: string
                  description: Preferred region for new account creation.
                  example: us-east-va
      responses:
        "200":
          description: Verification code sent.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: verification code sent
        "400":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/RateLimited"

  /control/v1/auth/email/verify:
    post:
      tags: [Email auth]
      summary: Verify email code
      description: |
        Validates the verification code. Returns one of three outcomes:
        - `authenticated`: Existing user, returns token pair
        - `totp_required`: User has TOTP enabled, returns challenge nonce
        - `registration_required`: New user, returns onboarding token
      operationId: emailVerify
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, code]
              properties:
                email:
                  type: string
                  format: email
                code:
                  type: string
                  example: "123456"
                region:
                  type: string
      responses:
        "200":
          description: Verification result (discriminated by `status` field).
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/VerifyAuthenticated"
                  - $ref: "#/components/schemas/VerifyTotpRequired"
                  - $ref: "#/components/schemas/VerifyRegistrationRequired"
              examples:
                authenticated:
                  value:
                    status: authenticated
                    access_token: eyJ...
                    refresh_token: rt_abc123
                    token_type: Bearer
                totp_required:
                  value:
                    status: totp_required
                    challenge_nonce: base64-encoded-nonce
                registration_required:
                  value:
                    status: registration_required
                    onboarding_token: ilobt_abc123
        "400":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/RateLimited"

  /control/v1/auth/email/complete:
    post:
      tags: [Email auth]
      summary: Complete registration
      description: Creates a new user account and organization. Requires a valid onboarding token from the verify step.
      operationId: emailComplete
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [onboarding_token, email, name, organization_name]
              properties:
                onboarding_token:
                  type: string
                email:
                  type: string
                  format: email
                name:
                  type: string
                  example: Alice Chen
                organization_name:
                  type: string
                  example: Northwind Analytics
                region:
                  type: string
      responses:
        "200":
          description: Registration complete. Returns token pair and resource slugs.
          content:
            application/json:
              schema:
                type: object
                properties:
                  registration:
                    type: object
                    properties:
                      user:
                        type: integer
                        format: uint64
                      organization:
                        type: integer
                        format: uint64
                      access_token:
                        type: string
                      refresh_token:
                        type: string
                      token_type:
                        type: string
                        example: Bearer
        "400":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/RateLimited"

  # ── Session ──────────────────────────────────────────────────────────

  /control/v1/auth/refresh:
    post:
      tags: [Session]
      summary: Refresh session tokens
      description: Exchange a refresh token for a new access/refresh token pair. The refresh token can be sent in the request body or via the `inferadb_refresh` cookie.
      operationId: refreshSession
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                refresh_token:
                  type: string
                  description: Omit if using the refresh cookie.
      responses:
        "200":
          description: New token pair.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionTokenResponse"
        "401":
          $ref: "#/components/responses/AuthenticationError"

  /control/v1/auth/logout:
    post:
      tags: [Session]
      summary: Log out
      description: Clears session cookies. Always succeeds.
      operationId: logout
      responses:
        "200":
          description: Logged out.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: logged out

  /control/v1/auth/revoke-all:
    post:
      tags: [Session]
      summary: Revoke all sessions
      description: Revokes all refresh tokens for the authenticated user.
      operationId: revokeAll
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Sessions revoked.
          content:
            application/json:
              schema:
                type: object
                properties:
                  revoked_count:
                    type: integer
                    format: uint64
        "401":
          $ref: "#/components/responses/AuthenticationError"

  # ── MFA ──────────────────────────────────────────────────────────────

  /control/v1/auth/totp/verify:
    post:
      tags: [MFA]
      summary: Verify TOTP code
      description: Completes authentication with a TOTP code after the email verify step returned `totp_required`.
      operationId: verifyTotp
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_slug, totp_code, challenge_nonce]
              properties:
                user_slug:
                  type: integer
                  format: uint64
                totp_code:
                  type: string
                  example: "123456"
                challenge_nonce:
                  type: string
                  format: base64
      responses:
        "200":
          description: Authentication successful.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionTokenResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/RateLimited"

  /control/v1/auth/recovery:
    post:
      tags: [MFA]
      summary: Use a recovery code
      description: Authenticates with a one-time recovery code. Returns the number of remaining codes.
      operationId: consumeRecovery
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_slug, code, challenge_nonce]
              properties:
                user_slug:
                  type: integer
                  format: uint64
                code:
                  type: string
                  example: ABCD-1234
                challenge_nonce:
                  type: string
                  format: base64
      responses:
        "200":
          description: Authentication successful.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SessionTokenResponse"
                  - type: object
                    properties:
                      remaining_codes:
                        type: integer
                        format: uint32
        "400":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/RateLimited"

  /control/v1/auth/passkey/begin:
    post:
      tags: [MFA]
      summary: Begin passkey authentication
      description: Initiates a WebAuthn authentication ceremony. Returns a challenge for the client to sign.
      operationId: passkeyBegin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_slug]
              properties:
                user_slug:
                  type: integer
                  format: uint64
      responses:
        "200":
          description: Authentication challenge.
          content:
            application/json:
              schema:
                type: object
                properties:
                  challenge_id:
                    type: string
                  challenge:
                    type: object
                    description: WebAuthn PublicKeyCredentialRequestOptions.
        "429":
          $ref: "#/components/responses/RateLimited"

  /control/v1/auth/passkey/finish:
    post:
      tags: [MFA]
      summary: Complete passkey authentication
      description: Completes the WebAuthn authentication ceremony with the signed credential.
      operationId: passkeyFinish
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [challenge_id, credential]
              properties:
                challenge_id:
                  type: string
                credential:
                  type: object
                  description: WebAuthn PublicKeyCredential response.
      responses:
        "200":
          description: Authentication result.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/VerifyAuthenticated"
                  - $ref: "#/components/schemas/VerifyTotpRequired"
        "400":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/RateLimited"

  # ── Email verification ───────────────────────────────────────────────

  /control/v1/auth/verify-email:
    post:
      tags: [Emails]
      summary: Verify an email address
      description: Confirms an email address using a verification token sent via email.
      operationId: verifyEmail
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
      responses:
        "200":
          description: Email verified.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  verified:
                    type: boolean
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Passkey Registration ─────────────────────────────────────────────

  /control/v1/users/me/credentials/passkeys/begin:
    post:
      tags: [Passkey registration]
      summary: Begin passkey registration
      description: Starts a WebAuthn registration ceremony for the authenticated user.
      operationId: passkeyRegisterBegin
      security:
        - BearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: Human-readable label for the credential.
                  example: MacBook Pro
      responses:
        "200":
          description: Registration challenge.
          content:
            application/json:
              schema:
                type: object
                properties:
                  challenge_id:
                    type: string
                  challenge:
                    type: object
                    description: WebAuthn PublicKeyCredentialCreationOptions.
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/AuthenticationError"

  /control/v1/users/me/credentials/passkeys/finish:
    post:
      tags: [Passkey registration]
      summary: Complete passkey registration
      description: Completes the WebAuthn registration ceremony and stores the credential.
      operationId: passkeyRegisterFinish
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [challenge_id, name, credential]
              properties:
                challenge_id:
                  type: string
                name:
                  type: string
                  example: MacBook Pro
                credential:
                  type: object
                  description: WebAuthn RegisterPublicKeyCredential response.
      responses:
        "200":
          description: Credential registered.
          content:
            application/json:
              schema:
                type: object
                properties:
                  slug:
                    type: integer
                    format: uint64
                  name:
                    type: string
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/AuthenticationError"

  # ── Users ────────────────────────────────────────────────────────────

  /control/v1/users/me:
    get:
      tags: [Users]
      summary: Get your profile
      operationId: getProfile
      security:
        - BearerAuth: []
      responses:
        "200":
          description: User profile.
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: "#/components/schemas/UserProfile"
        "401":
          $ref: "#/components/responses/AuthenticationError"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [Users]
      summary: Update your profile
      operationId: updateProfile
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: Alice Chen
      responses:
        "200":
          description: Updated profile.
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: "#/components/schemas/UserProfile"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/AuthenticationError"
    delete:
      tags: [Users]
      summary: Delete your account
      operationId: deleteUser
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Account deleted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "401":
          $ref: "#/components/responses/AuthenticationError"

  # ── Emails ───────────────────────────────────────────────────────────

  /control/v1/users/emails:
    get:
      tags: [Emails]
      summary: List your email addresses
      operationId: listEmails
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Email addresses.
          content:
            application/json:
              schema:
                type: object
                properties:
                  emails:
                    type: array
                    items:
                      $ref: "#/components/schemas/EmailInfo"
        "401":
          $ref: "#/components/responses/AuthenticationError"
    post:
      tags: [Emails]
      summary: Add an email address
      operationId: addEmail
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        "200":
          description: Email added (verification pending).
          content:
            application/json:
              schema:
                type: object
                properties:
                  email:
                    $ref: "#/components/schemas/EmailInfo"
                  message:
                    type: string
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/AuthenticationError"

  /control/v1/users/emails/{id}:
    delete:
      tags: [Emails]
      summary: Remove an email address
      operationId: deleteEmail
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/EmailId"
      responses:
        "200":
          description: Email removed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "401":
          $ref: "#/components/responses/AuthenticationError"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Organizations ────────────────────────────────────────────────────

  /control/v1/organizations:
    get:
      tags: [Organizations]
      summary: List your organizations
      operationId: listOrganizations
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PageSize"
        - $ref: "#/components/parameters/PageToken"
      responses:
        "200":
          description: Organizations.
          content:
            application/json:
              schema:
                type: object
                properties:
                  organizations:
                    type: array
                    items:
                      $ref: "#/components/schemas/Organization"
                  next_page_token:
                    type: string
        "401":
          $ref: "#/components/responses/AuthenticationError"
    post:
      tags: [Organizations]
      summary: Create an organization
      operationId: createOrganization
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  example: Northwind Analytics
      responses:
        "201":
          description: Organization created.
          content:
            application/json:
              schema:
                type: object
                properties:
                  organization:
                    $ref: "#/components/schemas/Organization"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/AuthenticationError"

  /control/v1/organizations/{org}:
    get:
      tags: [Organizations]
      summary: Get an organization
      operationId: getOrganization
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OrgSlug"
      responses:
        "200":
          description: Organization details.
          content:
            application/json:
              schema:
                type: object
                properties:
                  organization:
                    $ref: "#/components/schemas/Organization"
        "401":
          $ref: "#/components/responses/AuthenticationError"
    patch:
      tags: [Organizations]
      summary: Update an organization
      operationId: updateOrganization
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OrgSlug"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
      responses:
        "200":
          description: Updated organization.
          content:
            application/json:
              schema:
                type: object
                properties:
                  organization:
                    $ref: "#/components/schemas/Organization"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/AuthenticationError"
    delete:
      tags: [Organizations]
      summary: Delete an organization
      operationId: deleteOrganization
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OrgSlug"
      responses:
        "200":
          description: Organization deleted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "401":
          $ref: "#/components/responses/AuthenticationError"

  # ── Members ──────────────────────────────────────────────────────────

  /control/v1/organizations/{org}/members:
    get:
      tags: [Members]
      summary: List organization members
      operationId: listMembers
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OrgSlug"
        - $ref: "#/components/parameters/PageSize"
        - $ref: "#/components/parameters/PageToken"
      responses:
        "200":
          description: Members.
          content:
            application/json:
              schema:
                type: object
                properties:
                  members:
                    type: array
                    items:
                      $ref: "#/components/schemas/Member"
                  next_page_token:
                    type: string
        "401":
          $ref: "#/components/responses/AuthenticationError"

  /control/v1/organizations/{org}/members/{member}:
    patch:
      tags: [Members]
      summary: Update a member's role
      operationId: updateMemberRole
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OrgSlug"
        - $ref: "#/components/parameters/MemberSlug"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role:
                  type: string
                  enum: [admin, member]
      responses:
        "200":
          description: Role updated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  member:
                    $ref: "#/components/schemas/Member"
        "401":
          $ref: "#/components/responses/AuthenticationError"
        "403":
          $ref: "#/components/responses/AuthorizationError"
    delete:
      tags: [Members]
      summary: Remove a member
      operationId: removeMember
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OrgSlug"
        - $ref: "#/components/parameters/MemberSlug"
      responses:
        "200":
          description: Member removed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "401":
          $ref: "#/components/responses/AuthenticationError"
        "403":
          $ref: "#/components/responses/AuthorizationError"

  /control/v1/organizations/{org}/members/me:
    delete:
      tags: [Members]
      summary: Leave an organization
      operationId: leaveOrganization
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OrgSlug"
      responses:
        "200":
          description: Left organization.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "401":
          $ref: "#/components/responses/AuthenticationError"

  # ── Invitations ──────────────────────────────────────────────────────

  /control/v1/organizations/{org}/invitations:
    get:
      tags: [Invitations]
      summary: List organization invitations
      operationId: listInvitations
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OrgSlug"
        - $ref: "#/components/parameters/PageSize"
        - $ref: "#/components/parameters/PageToken"
      responses:
        "200":
          description: Invitations.
          content:
            application/json:
              schema:
                type: object
                properties:
                  invitations:
                    type: array
                    items:
                      $ref: "#/components/schemas/Invitation"
                  next_page_token:
                    type: string
        "401":
          $ref: "#/components/responses/AuthenticationError"
    post:
      tags: [Invitations]
      summary: Invite a user to the organization
      operationId: createInvitation
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OrgSlug"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
                role:
                  type: string
                  enum: [admin, member]
                  description: Defaults to member.
      responses:
        "201":
          description: Invitation created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invitation"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/AuthenticationError"

  /control/v1/organizations/{org}/invitations/{invitation}:
    delete:
      tags: [Invitations]
      summary: Cancel an invitation
